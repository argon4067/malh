name: malh

services:
  db:
    image: mysql:8.0
    container_name: malh-db
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: ${TZ}
    ports:
      - "3307:3306"
    volumes:
      - malh_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build:
      context: .
    container_name: malh-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: ${DATABASE_URL}
      STORAGE_DIR: ${STORAGE_DIR}
      ENV: ${ENV}
      TZ: ${TZ}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENAI_TRANSCRIPT_REFINE_MODEL: ${OPENAI_TRANSCRIPT_REFINE_MODEL}
      OPENAI_TRANSCRIPT_REFINE_TIMEOUT_SEC: ${OPENAI_TRANSCRIPT_REFINE_TIMEOUT_SEC}
      INTERVIEW_AUDIO_CLEANUP_INTERVAL_SEC: ${INTERVIEW_AUDIO_CLEANUP_INTERVAL_SEC}
      INTERVIEW_AUDIO_STALE_TTL_SEC: ${INTERVIEW_AUDIO_STALE_TTL_SEC}
      FASTER_WHISPER_MODEL_SIZE: ${FASTER_WHISPER_MODEL_SIZE}
      FASTER_WHISPER_DEVICE: ${FASTER_WHISPER_DEVICE}
      FASTER_WHISPER_COMPUTE_TYPE: ${FASTER_WHISPER_COMPUTE_TYPE}
      FASTER_WHISPER_BEAM_SIZE: ${FASTER_WHISPER_BEAM_SIZE}
    expose:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --proxy-headers

  caddy:
    image: caddy:2
    container_name: malh-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  malh_mysql_data:
  caddy_data:
  caddy_config: