name: malh

services:
  db:
    image: mysql:8.0
    container_name: malh-db
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "3307:3306"
    volumes:
      - malh_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build:
      context: .
    container_name: malh-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    expose:
      - "8000"
    ports:
      - "8001:8000"
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --proxy-headers

  caddy:
    image: caddy:2
    container_name: malh-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "9000:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  malh_mysql_data:
  caddy_data:
  caddy_config: