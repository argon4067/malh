{% extends "layouts/base.html" %}

{% block title %}답변 분석 진행 - 말해뭐해{% endblock %}

{% block head %}
<link rel="stylesheet" href="/static/css/interview/submit_loading.css">
{% endblock %}

{% block content %}
<div class="submit-loading-wrapper">
    <div class="loading-card">
        <h2 class="loading-title" id="statusTitle">AI가 답변을 분석하고 있습니다</h2>
        <p class="loading-desc" id="statusDesc">음성 데이터에서 텍스트를 추출하고 지표를 계산하는 중입니다.</p>
        <div class="progress-track">
            <div class="progress-fill" id="progressBar"></div>
        </div>
        <div class="progress-meta">
            <span id="percentageText">0%</span>
            <span>&nbsp;</span>
        </div>
        <div style="display:none;" aria-hidden="true">
            <div id="icon-step-1" class="stage-icon active"></div>
            <div id="icon-step-2" class="stage-icon"></div>
            <div id="icon-step-3" class="stage-icon"></div>
            <div id="dot-1" class="step-dot active"></div>
            <div id="dot-2" class="step-dot"></div>
            <div id="dot-3" class="step-dot"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/result/answer_analysis.js"></script>
{% endblock %}
