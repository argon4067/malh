{% extends "layouts/base.html" %}

{% block title %}遺꾩꽍 吏꾪뻾 - 留먰빐遊먰빐{% endblock %}

{% block head %}
<link rel="stylesheet" href="/static/css/interview/submit_loading.css">
{% endblock %}

{% block content %}
<div class="submit-loading-wrapper">
    <div class="loading-card">
        <h2 class="loading-title">?쒖텧 遺꾩꽍 吏꾪뻾 以?/h2>
        <p class="loading-desc" id="loadingMessage">?묒뾽???쒖옉?⑸땲??</p>
        <div class="progress-track">
            <div id="loadingProgressBar" class="progress-fill"></div>
        </div>
        <div class="progress-meta">
            <span id="loadingPercent">0%</span>
            <span id="loadingCount">0/0</span>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    window.SUBMIT_LOADING_CONTEXT = {
        sessionId: {{ session_id }}
    };
</script>
<script src="/static/js/interview/submit_loading.js"></script>
{% endblock %}
