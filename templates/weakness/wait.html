{% extends "layouts/base.html" %}

{% block title %}약점 보강 생성 중 - 말해뭐해{% endblock %}

{% block head %}
<link rel="stylesheet" href="/static/css/interview/submit_loading.css">
{% endblock %}

{% block content %}
<div class="submit-loading-wrapper">
    <div class="loading-card">
        <h2 class="loading-title">약점 보강 질문 생성 중입니다</h2>
        <p class="loading-desc">부족한 영역을 기준으로 맞춤 질문을 만들고 있습니다.</p>
        <div class="progress-track">
            <div class="progress-fill" id="progressBar"></div>
        </div>
        <div class="progress-meta">
            <span id="percentageText">0%</span>
            <span>&nbsp;</span>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/weakness/weakness_wait.js"></script>
{% endblock %}
