{% extends "layouts/base.html" %}

{% block title %}이력서 분석 중 - 말해뭐해{% endblock %}

{% block content %}
<div class="resume-container-wrapper">
    <div class="container">
        <div class="upload-container" style="text-align:center; padding:80px 20px;">
            <h2>이력서 분석 중입니다...</h2>
            <p>잠시만 기다려 주세요.</p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function runAnalysis() {
        const formData = new FormData();
        formData.append("model", "{{ model }}");

        const response = await fetch("/resumes/{{ resume_id }}/analyze", {
            method: "POST",
            body: formData
        });

        const result = await response.json();

        if (!response.ok) {
            alert(result.detail || "분석 실패");
            return;
        }

        location.href = "/resumes";
    }

    runAnalysis();
</script>
{% endblock %}
