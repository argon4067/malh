{% extends "layouts/base.html" %}

{% block title %}이력서 분석 중 - 말해뭐해{% endblock %}

{% block head %}
<link rel="stylesheet" href="/static/css/interview/submit_loading.css">
{% endblock %}

{% block content %}
<div
    id="resumeWaitPage"
    class="submit-loading-wrapper"
    data-resume-id="{{ resume_id }}"
    data-model="{{ model }}"
>
    <div class="loading-card">
        <h2 class="loading-title">이력서 분석 및 질문 생성 중입니다</h2>
        <p class="loading-desc" id="statusText">분석 준비 중입니다.</p>
        <div class="progress-track">
            <div id="progressBar" class="progress-fill"></div>
        </div>
        <div class="progress-meta">
            <span id="percentageText">0%</span>
            <span>&nbsp;</span>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/resume/resume_wait.js"></script>
{% endblock %}
